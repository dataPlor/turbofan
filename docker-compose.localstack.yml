version: "3.8"

services:
  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      - SERVICES=cloudformation,ecr,s3,stepfunctions,batch,sts,iam
      - DEFAULT_REGION=us-east-1
      - DEBUG=0
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
