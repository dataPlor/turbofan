name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        ruby: ['3.2', '3.3', '3.4']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run tests
        run: bundle exec rspec

  gem_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Build gem (validates spec.files manifest)
        run: gem build turbofan.gemspec
      - name: Install + require smoke test (catches post-install load failures)
        run: |
          gem install ./turbofan-*.gem
          ruby -rturbofan -e 'raise "VERSION missing" unless Turbofan::VERSION.is_a?(String); puts "loaded turbofan #{Turbofan::VERSION}"'
          ruby -r turbofan/runtime -e 'raise "Runtime::Wrapper missing" unless defined?(Turbofan::Runtime::Wrapper); puts "loaded turbofan/runtime"'
          ruby -r turbofan/deploy -e 'raise "Deploy::ImageBuilder missing" unless defined?(Turbofan::Deploy::ImageBuilder); puts "loaded turbofan/deploy"'

  rubocop:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Run rubocop
        run: bundle exec rubocop --parallel || true

  bundle_audit:
    runs-on: ubuntu-latest
    # Blocks merges on known CVEs in dependencies. Rubocop stays advisory
    # until the .rubocop.yml baseline is tuned; a CVE in a transitive gem
    # is a production risk, not a style hint.
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Install bundler-audit
        run: gem install bundler-audit
      - name: Audit dependencies
        run: bundle audit check --update
